<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HallPass — Rate your teacher.</title>
  <style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d0d0d;color:#fff;min-height:100vh;}
:root{--blue:#7dd3fc;--blue-dark:#0a1628;--card:#111827;--border:#1a2744;--text:#fff;--muted:#6b7a99;--radius:14px;--radius-lg:18px;}
#app{max-width:820px;margin:0 auto;padding:2rem 1.25rem 4rem;}
.header{text-align:center;margin-bottom:2.5rem;padding-bottom:2rem;border-bottom:1px solid var(--border);}
.header h1{font-size:34px;font-weight:800;color:#fff;letter-spacing:-1px;}
.header h1 span{color:var(--blue);}
.header-badge{display:inline-block;background:var(--blue);color:#000;font-size:10px;font-weight:800;padding:3px 14px;border-radius:20px;letter-spacing:0.08em;text-transform:uppercase;margin-top:8px;}
.nav-link{font-size:12px;color:#4a7cc7;cursor:pointer;margin-top:8px;display:inline-block;background:none;border:none;padding:0;text-decoration:underline;}
input,textarea,select,button{font-family:inherit;}
.search-wrap{margin-bottom:1rem;}
.search-wrap input{width:100%;height:42px;padding:0 16px;border-radius:21px;border:2px solid var(--border);background:var(--card);font-size:14px;color:#fff;outline:none;display:block;}
.search-wrap input::placeholder{color:#4b5563;}
.search-wrap input:focus{border-color:var(--blue);}
.btn{height:42px;padding:0 18px;border-radius:21px;border:1.5px solid var(--border);background:var(--card);color:#fff;font-size:14px;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.btn:hover{border-color:var(--blue);}
.btn-primary{background:var(--blue);color:#000;border-color:var(--blue);font-weight:700;}
.btn-primary:hover{background:#93dcfd;}
.btn-sm{height:34px;padding:0 14px;font-size:13px;}
.btn-full{width:100%;}
.btn-danger{background:#1f0606;border:1px solid #7f1d1d;color:#f87171;font-size:12px;height:28px;padding:0 10px;border-radius:20px;cursor:pointer;}
.btn-danger:hover{background:#7f1d1d;color:#fff;}
.btn-edit{background:#0a1628;border:1px solid var(--blue);color:var(--blue);font-size:12px;height:28px;padding:0 10px;border-radius:20px;cursor:pointer;}
.btn-edit:hover{background:var(--blue);color:#000;}
.admin-bar{background:#0d1f0d;border:1px solid #166534;border-radius:var(--radius);padding:10px 16px;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#4ade80;}
.loading{text-align:center;padding:3rem;color:var(--muted);font-size:14px;}
.spinner{display:inline-block;width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.section-label{font-size:10px;color:var(--blue);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;font-weight:800;}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);cursor:pointer;margin-bottom:1.5rem;background:none;border:none;padding:0;}
.back-btn:hover{color:#fff;}
.school-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem;}
.school-card{background:var(--card);border-radius:var(--radius);padding:11px 14px;border:1.5px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.15s;}
.school-card:hover{border-color:var(--blue);transform:translateX(3px);}
.school-logo{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;border:1.5px solid var(--border);}
.school-logo img{width:100%;height:100%;object-fit:contain;padding:4px;}
.school-logo-initials{font-size:12px;font-weight:800;}
.school-info{flex:1;min-width:0;}
.school-name{font-size:13px;font-weight:700;color:#fff;}
.school-loc{font-size:11px;color:var(--muted);margin-top:2px;}
.school-arrow{font-size:18px;color:#2a3a5e;flex-shrink:0;}
.school-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;gap:12px;}
.school-title{font-size:22px;font-weight:700;color:#fff;}
.school-subtitle{font-size:13px;color:var(--muted);margin-top:4px;}
.teachers-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:1.5rem;}
.teacher-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;display:block;width:100%;text-align:left;transition:border-color 0.15s;}
.teacher-card:hover{border-color:var(--blue);}
.teacher-card-inner{cursor:pointer;}
.teacher-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.teacher-info{display:flex;align-items:center;gap:12px;min-width:0;}
.avatar{width:42px;height:42px;border-radius:50%;background:#000;border:2px solid var(--blue);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--blue);flex-shrink:0;}
.teacher-name{font-size:15px;font-weight:700;color:#fff;}
.teacher-subject{font-size:13px;color:var(--muted);margin-top:2px;}
.teacher-right{flex-shrink:0;text-align:right;}
.rating-badge{background:var(--blue);color:#000;font-size:13px;font-weight:800;padding:4px 10px;border-radius:20px;display:inline-block;white-space:nowrap;}
.review-count{font-size:12px;color:var(--muted);text-align:right;margin-top:4px;}
.teacher-preview{font-size:13px;color:var(--muted);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);line-height:1.5;font-style:italic;}
.admin-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.edit-form{background:#0d0d0d;border-radius:var(--radius);padding:12px;margin-top:10px;border:1px solid var(--border);}
.detail-header{display:flex;align-items:center;gap:16px;margin-bottom:1.5rem;}
.detail-avatar{width:58px;height:58px;border-radius:50%;background:#000;border:2px solid var(--blue);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:var(--blue);flex-shrink:0;}
.detail-name{font-size:22px;font-weight:700;color:#fff;}
.detail-meta{font-size:14px;color:var(--muted);margin-top:3px;}
.stats-row{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap;}
.stat-card{flex:1;min-width:70px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 8px;text-align:center;}
.stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
.stat-value{font-size:20px;font-weight:800;color:var(--blue);margin-top:4px;}
.stat-sub{font-size:11px;color:var(--muted);}
.ai-summary{background:var(--blue-dark);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1.5rem;}
.ai-label{font-size:10px;color:var(--blue);font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:0.08em;}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--blue);}
.ai-bullets{padding-left:0;list-style:none;}
.ai-bullets li{font-size:13px;color:#c9d8f0;line-height:1.6;padding:3px 0 3px 16px;position:relative;}
.ai-bullets li::before{content:"→";position:absolute;left:0;color:var(--blue);font-size:11px;}
.ai-loading{color:var(--muted);font-style:italic;font-size:14px;}
.reviews-section{margin-bottom:1.5rem;}
.review-item{padding:16px 0;border-bottom:1px solid var(--border);}
.review-item:last-child{border-bottom:none;}
.review-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.review-stars{color:var(--blue);font-size:14px;font-weight:700;}
.review-date{font-size:11px;color:#4b5563;background:#0d0d0d;padding:2px 8px;border-radius:20px;}
.review-meta-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.review-meta-pill{font-size:12px;padding:3px 10px;border-radius:20px;background:#1a2744;color:#93b4e0;}
.review-meta-pill.yes{background:#052e16;color:#4ade80;}
.review-meta-pill.no{background:#1f0606;color:#f87171;}
.review-text{font-size:14px;color:#c9d8f0;line-height:1.65;}
.note-row{display:flex;flex-direction:column;gap:4px;margin-top:8px;}
.note-item{display:flex;align-items:flex-start;gap:8px;background:#0d0d0d;border-radius:8px;padding:6px 10px;border-left:3px solid var(--border);}
.note-label{font-size:10px;font-weight:800;color:var(--blue);white-space:nowrap;text-transform:uppercase;letter-spacing:0.04em;}
.note-text{font-size:11px;color:#9ca3af;line-height:1.4;}
.review-advice{font-size:13px;margin-top:10px;padding:8px 12px;border-left:3px solid var(--blue);background:var(--blue-dark);border-radius:0 8px 8px 0;}
.review-advice strong{color:var(--blue);}
.review-advice span{color:#c9d8f0;}
.card-form{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.5rem;}
.form-title{font-size:16px;font-weight:700;margin-bottom:1.25rem;color:#fff;}
.form-section{margin-bottom:1.5rem;}
.form-section-title{font-size:12px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.form-row{margin-bottom:14px;}
.form-label{font-size:13px;color:var(--muted);margin-bottom:6px;display:block;}
.form-row input[type=text],.form-row textarea,.form-row select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;background:#0d0d0d;color:#fff;outline:none;transition:border-color 0.15s;}
.form-row input[type=text]:focus,.form-row textarea:focus,.form-row select:focus{border-color:var(--blue);}
.form-row textarea{resize:vertical;line-height:1.6;}
.form-row select option{background:#111827;}
.scale-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.scale-label-sm{font-size:12px;color:var(--muted);min-width:20px;text-align:center;flex-shrink:0;}
.scale-val{font-size:15px;font-weight:800;color:var(--blue);min-width:28px;text-align:center;flex-shrink:0;}
input[type=range].colored-slider{flex:1;cursor:pointer;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;outline:none;border:none;}
input[type=range].colored-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--blue);cursor:pointer;border:2px solid #000;box-shadow:0 1px 4px rgba(0,0,0,0.4);}
input[type=range].colored-slider::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--blue);cursor:pointer;border:2px solid #000;}
.toggle-row{display:flex;gap:10px;}
.toggle-btn{flex:1;padding:10px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;cursor:pointer;background:#0d0d0d;color:var(--muted);text-align:center;transition:all 0.15s;}
.toggle-btn:hover{border-color:var(--blue);}
.toggle-yes{background:#052e16;border-color:#166534;color:#4ade80;font-weight:700;}
.toggle-no{background:#1f0606;border-color:#7f1d1d;color:#f87171;font-weight:700;}
.star-picker{display:flex;gap:6px;}
.star-btn{background:#0d0d0d;border:2px solid var(--border);border-radius:var(--radius);font-size:26px;cursor:pointer;padding:4px 8px;line-height:1;color:#1a2744;user-select:none;-webkit-user-select:none;transition:all 0.1s;}
.star-btn.lit{color:var(--blue);background:var(--blue-dark);border-color:var(--blue);}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:1.25rem;}
.success-msg{background:#052e16;color:#4ade80;font-size:14px;padding:12px 16px;border-radius:var(--radius);margin-top:12px;font-weight:500;border:1px solid #166534;}
.error-msg{background:#1f0606;color:#f87171;font-size:14px;padding:12px 16px;border-radius:var(--radius);margin-top:12px;border:1px solid #7f1d1d;}
.empty{text-align:center;padding:2.5rem;color:var(--muted);font-size:14px;}
.suggest-box{background:#0d0d0d;border-radius:var(--radius);padding:10px 14px;margin-top:8px;border:1px solid var(--border);}
.suggest-label{font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;}
.suggest-chips{display:flex;flex-wrap:wrap;gap:6px;}
.suggest-chip{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all 0.15s;}
.suggest-chip:hover{border-color:var(--blue);color:var(--blue);}
.period-row{display:flex;gap:8px;}
.period-row select{flex:1;}
.category-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
.category-pill{font-size:13px;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:#0d0d0d;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.category-pill:hover{border-color:var(--blue);color:var(--blue);}
.category-pill.selected{background:var(--blue-dark);border-color:var(--blue);color:var(--blue);font-weight:700;}
.feedback-intro{font-size:14px;color:var(--muted);margin-bottom:1.5rem;line-height:1.6;}
.submitted-box{text-align:center;padding:3rem 1rem;}
.submitted-check{font-size:52px;color:var(--blue);margin-bottom:16px;}
.submitted-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:8px;}
.submitted-sub{font-size:14px;color:var(--muted);}
.suggestion-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:10px;}
.suggestion-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px;}
.suggestion-cat{font-size:12px;padding:3px 10px;border-radius:20px;background:var(--blue-dark);color:var(--blue);}
.suggestion-who{font-size:12px;color:var(--muted);}
.suggestion-text{font-size:14px;color:#c9d8f0;line-height:1.5;}
.footer{text-align:center;margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--border);}
.admin-link{font-size:11px;color:#1a2744;background:none;border:none;cursor:pointer;padding:0;}
.admin-link:hover{color:var(--muted);}
@media(max-width:600px){.stats-row{gap:6px;}.stat-card{padding:8px 6px;}.stat-value{font-size:17px;}.school-header{flex-direction:column;}}
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>Hall<span>Pass</span></h1>
    <div class="header-badge">Rate your teacher.</div><br/>
    <button class="nav-link" onclick="goFeedback()">Want to add your school or have any other suggestions or issues?</button>
  </div>
  <div id="view-root"></div>
  <div class="footer"><button class="admin-link" onclick="promptAdmin()">Admin</button></div>
</div>
<script>
const SUPABASE_URL="https://kxlkljrimhvmjrftrvuw.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4bGtsanJpbWh2bWpyZnRydnV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4ODAxOTYsImV4cCI6MjA4OTQ1NjE5Nn0._VnqxOge1_KWVAcVGWM3ZQppQdFJrxXv9oJqsUptNqs";
const ADMIN_PW="maroonman";
const PERIODS=["0","1st","2nd","3rd","4th","5th","6th","7th","8th"];
const YEARS=["2025-2026","2024-2025","2023-2024","2022-2023","2021-2022"];
const FB_CATS=["New feature idea","Bug or something broken","Add / remove a school","Add / remove a teacher","Review concern","Other"];

const SCHOOL_LOGOS={
  "Palos Verdes High School":{url:"https://www.pvpusd.net/apps/download/Z5JSfoVbYsG3z76DaWzVsn1eXw7QbTSltkVMrusPC6lS6ZZP.png/logo_Sea_King-largest.png",bg:"#1a0000",color:"#ef4444",initials:"PV"},
  "Palos Verdes Peninsula High School":{url:"https://3.files.edl.io/10fa/24/04/24/192527-2a642ce8-646c-4454-9b88-017c51168c4d.png",bg:"#1a1400",color:"#f9e03b",initials:"PVP"},
  "Mira Costa High School":{url:"https://www.thecommencementgroup.com/wp-content/uploads/2020/01/cropped-7.-Interlock-MC-512.png",bg:"#0a2e12",color:"#f9e03b",initials:"MC"},
  "Redondo Union High School":{url:"https://3.files.edl.io/3734/25/08/28/184125-f48aaa0a-11bf-46ac-824a-56b04fe89efa.png",bg:"#1a0000",color:"#ef4444",initials:"RU"},
  "San Pedro High School":{url:"https://sphs.theswimguy.com/media/.renditions/catalog/category/TeamLogos/Screen_Shot_2018-12-20_at_3.16.22_PM.jpg",bg:"#1a1400",color:"#f9e03b",initials:"SP"},
  "South High School":{url:"https://pbs.twimg.com/profile_images/1119395464850239489/jgaQkA3V_400x400.jpg",bg:"#0a1f0a",color:"#22c55e",initials:"SHS"},
  "North High School":{url:"https://www.tusd.org/schools/north-high-school/academics/files/images/north-high-logo.png",bg:"#040d1f",color:"#1d4ed8",initials:"NHS"},
  "El Segundo High School":{url:"https://sportshub2-uploads.vnn-prod.zone/files/sites/841/2018/02/06181724/logo_outline.png",bg:"#060e2a",color:"#facc15",initials:"ES"},
  "Bishop Montgomery High School":{url:"https://3.files.edl.io/efc0/23/10/31/142436-d89ecd88-49be-4dae-9a25-fe7a6a2b5d2b.png",bg:"#100a00",color:"#d4af37",initials:"BM"},
  "Torrance High School":{url:"https://www.tusd.org/schools/torrance-high-school/athletics/files/images/Screen%20Shot%202020-05-07%20at%204.51.30%20PM.png",bg:"#1a0505",color:"#991b1b",initials:"THS"},
  "Rolling Hills Preparatory School":{url:"https://assets.scorebooklive.com/uploads/production/school/9604/image/Rolling_Hills_Prep__CA__Huskies_2_Logo.png",bg:"#0a0f2a",color:"#f97316",initials:"RHP"},
  "West High School":{url:"https://www.tusd.org/schools/west-high-school/files/Images/WHS%20Stock%20Images/GoldWBrownOutline.png",bg:"#1a1000",color:"#d4b483",initials:"WHS"},
};

function schoolLogoHTML(name){
  const s=SCHOOL_LOGOS[name]||{bg:"#111827",color:"#7dd3fc",initials:name.split(" ").map(w=>w[0]).join("").slice(0,3)};
  if(s.url){return `<div class="school-logo" style="background:${s.bg}"><img src="${s.url}" onerror="this.parentNode.innerHTML='<span class=school-logo-initials style=color:${s.color};font-size:11px>${s.initials}</span>'"/></div>`;}
  return `<div class="school-logo" style="background:${s.bg};display:flex;align-items:center;justify-content:center;"><span class="school-logo-initials" style="color:${s.color};font-size:11px">${s.initials}</span></div>`;
}

async function sb(path,options={}){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{
    headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json","Prefer":"return=representation",...(options.headers||{})},
    ...options
  });
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const txt=await res.text();return txt?JSON.parse(txt):[];
}

function ini(n){return n.split(" ").filter(w=>/[A-Z]/.test(w)).map(w=>w[0]).join("").slice(0,2);}
function starsHTML(n,max=5){return Array.from({length:max},(_,i)=>i<Math.round(n)?"★":"☆").join("");}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function slBg(v){const p=((v-1)/9)*100;return`linear-gradient(to right,#7dd3fc 0%,#7dd3fc ${p}%,#1a2744 ${p}%,#1a2744 100%)`;}
function fmtDate(d){const dt=new Date(d);return["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][dt.getMonth()]+" "+dt.getFullYear();}

let S={
  view:"search",school:null,teacher:null,searchVal:"",
  schools:[],teachers:[],reviews:[],suggestions:[],
  showAddTeacher:false,showReviewForm:false,editingTeacherId:null,
  rf:{stars:0,period:"",year:"",subject:"",difficulty:5,diffNote:"",chill:5,chillNote:"",observant:5,obsNote:"",wouldTakeAgain:null,advice:"",text:""},
  successMsg:"",errorMsg:"",aiSum:{},aiSug:{},
  fb:{category:"",text:"",submitted:false},
  isAdmin:false,loading:false
};

function render(){
  const root=document.getElementById("view-root");
  if(S.loading){root.innerHTML=`<div class="loading"><div class="spinner"></div><br>Loading...</div>`;return;}
  if(S.view==="feedback"){root.innerHTML=renderFeedback();return;}
  if(!S.school){root.innerHTML=renderSearch();setupSearch();}
  else if(!S.teacher){root.innerHTML=renderSchool();}
  else{root.innerHTML=renderTeacher();bindSliders();}
}

async function init(){S.loading=true;render();try{S.schools=await sb("schools?select=*&order=name");}catch(e){S.schools=[];}S.loading=false;render();}

function promptAdmin(){
  if(S.isAdmin){S.isAdmin=false;render();return;}
  const pw=prompt("Enter admin password:");

function getTeacher(){return S.teachers.find(t=>t.id===S.teacher);}

function calcStats(rev){
  if(!rev.length)return{avg:"—",diff:"—",chill:"—",obs:"—",wta:"—"};
  return{
    avg:(rev.reduce((a,r)=>a+r.stars,0)/rev.length).toFixed(1),
    diff:(rev.reduce((a,r)=>a+r.difficulty,0)/rev.length).toFixed(1),
    chill:(rev.reduce((a,r)=>a+r.chill,0)/rev.length).toFixed(1),
    obs:(rev.reduce((a,r)=>a+r.observant,0)/rev.length).toFixed(1),
    wta:Math.round(rev.filter(r=>r.would_take_again).length/rev.length*100)+"%"
  };
}

      <div class="stat-card"><div class="stat-label">Difficulty</div><div class="stat-value">${st.diff}<span class="stat-sub">/10</span></div></div>

    </div>

      ${sum===undefined?`<div class="ai-loading">Generating summary...</div>`:sum===null?`<div class="ai-loading">Not enough reviews to summarize yet.</div>`:`<ul class="ai-bullets">${sum.map(b=>`<li>${esc(b)}</li>`).join("")}</ul>`}
    </div>
    <div class="reviews-section"><div class="section-label">Student reviews</div>
      ${rev.length===0?`<div class="empty">No reviews yet. Write the first one!</div>`:rev.map(r=>`
        <div class="review-item">
          <div class="review-top"><span class="review-stars">${starsHTML(r.stars)} ${r.stars}/5</span><span class="review-date">${r.period?"Period "+r.period:""} ${r.year?"· "+r.year:""}</span></div>
          <div class="review-meta-row">
            <span class="review-meta-pill">Difficulty: ${r.difficulty}/10</span>
            <span class="review-meta-pill">Chill: ${r.chill}/10</span>
            <span class="review-meta-pill">Watchful: ${r.observant}/10</span>
            ${r.subject?`<span class="review-meta-pill">${esc(r.subject)}</span>`:""}
            <span class="review-meta-pill ${r.would_take_again?"yes":"no"}">${r.would_take_again?"✓ Would take again":"✗ Would not take again"}</span>
          </div>
          ${(r.diff_note||r.chill_note||r.obs_note)?`<div class="note-row">
            ${r.diff_note?`<div class="note-item"><span class="note-label">Difficulty:</span><span class="note-text">${esc(r.diff_note)}</span></div>`:""}
            ${r.chill_note?`<div class="note-item" style="border-left-color:#7dd3fc"><span class="note-label">Are they chill?</span><span class="note-text">${esc(r.chill_note)}</span></div>`:""}
            ${r.obs_note?`<div class="note-item" style="border-left-color:#3b82f6"><span class="note-label">Watchful:</span><span class="note-text">${esc(r.obs_note)}</span></div>`:""}

          ${S.isAdmin?`<div style="margin-top:8px"><button class="btn-danger" onclick="deleteReview(${r.id})">Delete review</button></div>`:""}
        </div>`).join("")}
    </div>
    ${S.showReviewForm?renderReviewForm(teacher):`<button class="btn btn-primary btn-full" onclick="S.showReviewForm=true;render()">Write a review</button>`}
    ${S.successMsg?`<div class="success-msg">✓ ${S.successMsg}</div>`:""}
    ${S.errorMsg?`<div class="error-msg">${S.errorMsg}</div>`:""}`;
}

async function submitReview(tid){
  const f=S.rf;
  f.subject=document.getElementById("r-subject")?.value||"";f.period=document.getElementById("r-period")?.value||"";
  f.year=document.getElementById("r-year")?.value||"";f.diffNote=document.getElementById("r-diffNote")?.value||"";
  f.chillNote=document.getElementById("r-chillNote")?.value||"";f.obsNote=document.getElementById("r-obsNote")?.value||"";
  f.advice=document.getElementById("r-advice")?.value||"";f.text=document.getElementById("r-text")?.value||"";
  if(!f.stars||!f.text.trim()){alert("Please add a star rating and write a review.");return;}
  if(f.wouldTakeAgain===null){alert("Please answer the 'Would you take again?' question.");return;}
  try{
    const res=await sb("reviews",{method:"POST",body:JSON.stringify({teacher_id:tid,stars:f.stars,period:f.period,year:f.year,subject:f.subject,difficulty:f.difficulty,diff_note:f.diffNote,chill:f.chill,chill_note:f.chillNote,observant:f.observant,obs_note:f.obsNote,would_take_again:f.wouldTakeAgain,advice:f.advice,review_text:f.text})});
    S.reviews.unshift(res[0]);
    S.rf={stars:0,period:"",year:"",subject:"",difficulty:5,diffNote:"",chill:5,chillNote:"",observant:5,obsNote:"",wouldTakeAgain:null,advice:"",text:""};
    S.showReviewForm=false;S.successMsg="Your review was submitted. Thank you!";S.errorMsg="";
    delete S.aiSum[tid];render();setTimeout(()=>{S.successMsg="";render();},4000);fetchSum(tid);
    const t=S.teachers.find(t=>t.id===tid);if(t){if(!t.reviews)t.reviews=[];t.reviews.push(res[0]);}
  }catch(e){S.errorMsg="Failed to submit. Please try again.";render();}
}

async function fetchSum(tid){
  const rev=S.reviews;if(!rev.length){S.aiSum[tid]=null;render();return;}
  if(S.aiSum[tid]!==undefined)return;S.aiSum[tid]=undefined;
  const teacher=getTeacher();if(!teacher)return;
  const rt=rev.map((r,i)=>`Review ${i+1} (${r.stars}/5, Difficulty:${r.difficulty}/10, Chill:${r.chill}/10, Watchful:${r.observant}/10, Would take again:${r.would_take_again?"Yes":"No"}): "${r.review_text}"${r.advice?` Advice:"${r.advice}"`:"" }`).join("\n");
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`You summarize student reviews for HallPass, a high school teacher review site. Summarize reviews of ${teacher.name} (${teacher.subject}) as 4-5 bullet points covering: teaching quality, difficulty, how chill vs strict they are, how watchful they are, and recommendation. Be honest and student-friendly. Return ONLY a JSON array of strings, no markdown.\n\nReviews:\n${rt}`}]})});
    const d=await res.json();S.aiSum[tid]=JSON.parse((d.content?.[0]?.text||"[]").replace(/```json|```/g,"").trim());
  }catch(e){S.aiSum[tid]=["Summary unavailable at this time."];}render();
}

async function fetchSug(tid){
  const f=S.rf;const teacher=getTeacher();if(!teacher)return;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`A student is reviewing ${teacher.name} (${teacher.subject}) on HallPass. Difficulty:${f.difficulty}/10, Chill:${f.chill}/10, Watchful:${f.observant}/10, Take again:${f.wouldTakeAgain===true?"Yes":f.wouldTakeAgain===false?"No":"not answered"}. Text:"${f.text||"none"}". Return JSON with "advice"(4 tips, max 8 words each) and "text"(4 phrases to add, max 8 words each). Only valid JSON.`}]})});
    const d=await res.json();S.aiSug[tid]=JSON.parse((d.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim());
  }catch(e){S.aiSug[tid]={advice:["Be specific about assignments","Mention exam difficulty","Share study tips","Note the class pace"],text:["Very helpful during office hours","Tests were challenging but fair","Class moves at a fast pace","Always willing to answer questions"]};}
  render();
}

document.addEventListener("click",function(e){
  if(e.target.classList.contains("star-btn")){const n=+e.target.dataset.star;S.rf.stars=n;document.querySelectorAll(".star-btn").forEach((b,i)=>b.classList.toggle("lit",i<n));}
});

init();
</script>
