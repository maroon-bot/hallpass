<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HallPass — Rate your teacher.</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9f9f7; color: #1a1a1a; min-height: 100vh; }
    :root {
      --brand: #1a6b4a; --brand-light: #e1f5ee; --brand-mid: #1d9e75;
      --bg: #f9f9f7; --card: #ffffff; --border: rgba(0,0,0,0.1);
      --text: #1a1a1a; --muted: #6b7280; --radius: 10px; --radius-lg: 14px;
    }
    #app { max-width: 820px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
    .header { text-align: center; margin-bottom: 2.5rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
    .header h1 { font-size: 32px; font-weight: 600; color: var(--text); letter-spacing: -0.5px; }
    .header h1 span { color: var(--brand-mid); }
    .header p { font-size: 15px; color: var(--muted); margin-top: 6px; }
    input, textarea, select, button { font-family: inherit; }
    .search-bar { display: flex; gap: 8px; margin-bottom: 0.75rem; }
    .search-bar input { flex: 1; height: 42px; padding: 0 14px; border-radius: var(--radius); border: 1px solid var(--border); font-size: 14px; background: var(--card); color: var(--text); outline: none; }
    .search-bar input:focus { border-color: var(--brand-mid); box-shadow: 0 0 0 3px rgba(29,158,117,0.1); }
    .btn { height: 42px; padding: 0 18px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 14px; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
    .btn:hover { background: #f3f3f0; }
    .btn-primary { background: var(--brand); color: #fff; border-color: var(--brand); }
    .btn-primary:hover { background: var(--brand-mid); border-color: var(--brand-mid); }
    .btn-sm { height: 34px; padding: 0 14px; font-size: 13px; }
    .btn-full { width: 100%; }
    .school-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
    .school-item { padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; background: var(--card); transition: all 0.15s; }
    .school-item:hover { border-color: var(--brand-mid); background: var(--brand-light); }
    .school-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .school-location { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .section-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); cursor: pointer; margin-bottom: 1.5rem; background: none; border: none; padding: 0; }
    .back-btn:hover { color: var(--text); }
    .school-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; gap: 12px; }
    .school-title { font-size: 22px; font-weight: 600; color: var(--text); }
    .school-subtitle { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .teachers-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }
    .teacher-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
    .teacher-card:hover { border-color: #ccc; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .teacher-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .teacher-info { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--brand-light); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: var(--brand); flex-shrink: 0; }
    .teacher-name { font-size: 15px; font-weight: 500; color: var(--text); }
    .teacher-subject { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .rating-badge { background: var(--brand-light); color: var(--brand); font-size: 13px; font-weight: 600; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
    .review-count { font-size: 12px; color: var(--muted); text-align: right; margin-top: 4px; }
    .teacher-preview { font-size: 13px; color: var(--muted); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); line-height: 1.5; font-style: italic; }
    .detail-header { display: flex; align-items: center; gap: 16px; margin-bottom: 1.5rem; }
    .detail-avatar { width: 58px; height: 58px; border-radius: 50%; background: var(--brand-light); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; color: var(--brand); flex-shrink: 0; }
    .detail-name { font-size: 22px; font-weight: 600; color: var(--text); }
    .detail-meta { font-size: 14px; color: var(--muted); margin-top: 3px; }
    .stats-row { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .stat-card { flex: 1; min-width: 80px; background: #f3f3f0; border-radius: var(--radius); padding: 12px 14px; }
    .stat-label { font-size: 11px; color: var(--muted); }
    .stat-value { font-size: 20px; font-weight: 600; color: var(--text); margin-top: 4px; }
    .stat-sub { font-size: 12px; color: var(--muted); }
    .ai-summary { background: var(--brand-light); border: 1px solid #9fe1cb; border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
    .ai-label { font-size: 12px; color: var(--brand); font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .ai-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--brand-mid); }
    .ai-bullets { padding-left: 0; list-style: none; }
    .ai-bullets li { font-size: 14px; color: var(--text); line-height: 1.6; padding: 3px 0 3px 18px; position: relative; }
    .ai-bullets li::before { content: "•"; position: absolute; left: 4px; color: var(--brand-mid); font-size: 16px; }
    .ai-loading { color: var(--muted); font-style: italic; font-size: 14px; }
    .reviews-section { margin-bottom: 1.5rem; }
    .review-item { padding: 16px 0; border-bottom: 1px solid var(--border); }
    .review-item:last-child { border-bottom: none; }
    .review-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .review-stars { color: var(--brand-mid); font-size: 14px; font-weight: 500; }
    .review-date { font-size: 12px; color: var(--muted); }
    .review-meta-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .review-meta-pill { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: #f0f0ed; color: var(--muted); }
    .review-meta-pill.yes { background: var(--brand-light); color: var(--brand); }
    .review-meta-pill.no { background: #fff0f0; color: #a32d2d; }
    .review-text { font-size: 14px; color: var(--text); line-height: 1.65; }
    .review-advice { font-size: 13px; color: var(--muted); margin-top: 10px; padding: 8px 12px; border-left: 3px solid var(--brand-mid); background: var(--brand-light); border-radius: 0 var(--radius) var(--radius) 0; }
    .review-advice strong { color: var(--brand); }
    .card-form { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .form-title { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; color: var(--text); }
    .form-section { margin-bottom: 1.5rem; }
    .form-section-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .form-row { margin-bottom: 14px; }
    .form-label { font-size: 13px; color: var(--muted); margin-bottom: 6px; display: block; }
    .form-row input, .form-row textarea, .form-row select { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; background: var(--card); color: var(--text); outline: none; transition: border-color 0.15s; }
    .form-row input:focus, .form-row textarea:focus, .form-row select:focus { border-color: var(--brand-mid); box-shadow: 0 0 0 3px rgba(29,158,117,0.1); }
    .form-row textarea { resize: vertical; line-height: 1.6; }
    .scale-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .scale-label-sm { font-size: 12px; color: var(--muted); min-width: 20px; text-align: center; }
    .scale-row input[type=range] { flex: 1; accent-color: var(--brand-mid); }
    .scale-val { font-size: 15px; font-weight: 600; color: var(--brand); min-width: 28px; text-align: center; }
    .toggle-row { display: flex; gap: 10px; }
    .toggle-btn { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; cursor: pointer; background: var(--card); color: var(--muted); text-align: center; transition: all 0.15s; }
    .toggle-btn:hover { background: #f3f3f0; }
    .toggle-yes { background: var(--brand-light); border-color: var(--brand-mid); color: var(--brand); font-weight: 500; }
    .toggle-no { background: #fff0f0; border-color: #f09595; color: #a32d2d; font-weight: 500; }
    .star-picker { display: flex; gap: 6px; }
    .star-btn { background: none; border: none; font-size: 26px; cursor: pointer; color: #ddd; padding: 0; line-height: 1; transition: color 0.1s; }
    .star-btn:hover, .star-btn.active { color: var(--brand-mid); }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.25rem; }
    .success-msg { background: var(--brand-light); color: var(--brand); font-size: 14px; padding: 12px 16px; border-radius: var(--radius); margin-top: 12px; font-weight: 500; }
    .empty { text-align: center; padding: 2.5rem; color: var(--muted); font-size: 14px; }
    .suggest-box { background: #f3f3f0; border-radius: var(--radius); padding: 10px 14px; margin-top: 8px; }
    .suggest-label { font-size: 11px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .suggest-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .suggest-chip { font-size: 12px; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .suggest-chip:hover { border-color: var(--brand-mid); color: var(--brand); background: var(--brand-light); }
    .period-row { display: flex; gap: 8px; }
    .period-row select { flex: 1; }
    @media (max-width: 600px) {
      .stats-row { gap: 6px; }
      .stat-card { padding: 10px 10px; }
      .stat-value { font-size: 17px; }
      .school-header { flex-direction: column; }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>Hall<span>Pass</span></h1>
    <p>Rate your teacher.</p>
  </div>
  <div id="view-root"></div>
</div>

<script>
const SCHOOLS = [
  { id: 1, name: "Palos Verdes Peninsula High School", location: "Rolling Hills Estates, CA", students: 2400 },
  { id: 2, name: "Mira Costa High School", location: "Manhattan Beach, CA", students: 2100 },
  { id: 3, name: "Redondo Union High School", location: "Redondo Beach, CA", students: 2300 },
  { id: 4, name: "Torrance High School", location: "Torrance, CA", students: 2000 },
  { id: 5, name: "Rolling Hills Preparatory School", location: "San Pedro, CA", students: 320 },
  { id: 6, name: "West High School", location: "Torrance, CA", students: 2200 },
];

const DB = {
  1: { teachers: [
    { id: 1, name: "Mr. Daniel Ortiz", subject: "AP Physics", rating: 4.7, reviews: [
      { stars: 5, period: "3rd", year: "2025-2026", subject: "AP Physics", difficulty: 8, diffNote: "Tests are hard but fair", chill: 7, chillNote: "Strict about deadlines", observant: 9, obsNote: "Always notices if you're off task", wouldTakeAgain: true, advice: "Start your labs early and ask questions during office hours.", text: "Best physics teacher I've ever had. His explanations make even the hardest topics click. Highly recommend." },
      { stars: 4, period: "5th", year: "2024-2025", subject: "Physics", difficulty: 7, diffNote: "", chill: 8, chillNote: "Pretty relaxed in class", observant: 8, obsNote: "", wouldTakeAgain: true, advice: "Do all the practice problems — they're basically the tests.", text: "Really knows his material. Gives helpful feedback on labs. Tests can be tough but he prepares you well." },
    ]},
    { id: 2, name: "Ms. Keiko Watanabe", subject: "AP English Literature", rating: 4.4, reviews: [
      { stars: 5, period: "2nd", year: "2025-2026", subject: "AP Lit", difficulty: 8, diffNote: "Essays are demanding", chill: 6, chillNote: "High expectations", observant: 7, obsNote: "Notices who's reading and who isn't", wouldTakeAgain: true, advice: "Read every book — she'll know if you didn't.", text: "Changed the way I read books. Her Socratic seminars are incredible and push you to think deeper." },
    ]},
  ]}
};

function getSchoolData(id) { if (!DB[id]) DB[id] = { teachers: [] }; return DB[id]; }
function initials(name) { return name.split(" ").filter(w => /[A-Z]/.test(w)).map(w => w[0]).join("").slice(0,2); }
function starsHTML(n, max=5) { return Array.from({length:max},(_,i)=>i<Math.round(n)?"★":"☆").join(""); }
function avgStat(reviews, key) { if (!reviews.length) return "—"; return (reviews.reduce((a,r)=>a+(r[key]||0),0)/reviews.length).toFixed(1); }
function pctWTA(reviews) { if (!reviews.length) return "—"; return Math.round(reviews.filter(r=>r.wouldTakeAgain).length/reviews.length*100)+"%"; }

let S = {
  school: null, teacher: null, searchVal: "",
  showAddTeacher: false, showReviewForm: false,
  teacherForm: { name:"", subject:"" },
  reviewForm: { stars:0, period:"", year:"", subject:"", difficulty:5, diffNote:"", chill:5, chillNote:"", observant:5, obsNote:"", wouldTakeAgain:null, advice:"", text:"" },
  successMsg:"", aiSummary:{}, aiSuggestions:{}
};

const PERIODS = ["1st","2nd","3rd","4th","5th","6th","7th","8th"];
const YEARS = ["2025-2026","2024-2025","2023-2024","2022-2023","2021-2022"];

function render() {
  const root = document.getElementById("view-root");
  if (!S.school) root.innerHTML = renderSearch();
  else if (!S.teacher) root.innerHTML = renderSchool();
  else root.innerHTML = renderTeacher();
}

function renderSearch() {
  const q = S.searchVal.toLowerCase();
  const filtered = SCHOOLS.filter(s=>s.name.toLowerCase().includes(q)||s.location.toLowerCase().includes(q));
  return `<div class="section-label">Find your school</div>
    <div class="search-bar"><input type="text" placeholder="Search by school name or city..." value="${S.searchVal}" oninput="S.searchVal=this.value;render()"/></div>
    <div class="school-list">${filtered.length===0?`<div class="empty">No schools found.</div>`:
      filtered.map(s=>`<div class="school-item" onclick="selectSchool(${s.id})">
        <div class="school-name">${s.name}</div>
        <div class="school-location">${s.location} · ~${s.students.toLocaleString()} students</div>
      </div>`).join("")}</div>`;
}

function renderSchool() {
  const data = getSchoolData(S.school.id);
  const teachers = data.teachers;
  return `<button class="back-btn" onclick="S.school=null;S.showAddTeacher=false;render()">← Back to search</button>
    <div class="school-header">
      <div><div class="school-title">${S.school.name}</div>
      <div class="school-subtitle">${S.school.location} · ${teachers.length} teacher${teachers.length!==1?"s":""} reviewed</div></div>
      <button class="btn btn-primary btn-sm" onclick="S.showAddTeacher=!S.showAddTeacher;render()">+ Add teacher</button>
    </div>
    ${S.showAddTeacher?renderAddTeacher():""}
    <div class="section-label">Teachers</div>
    <div class="teachers-grid">${teachers.length===0?`<div class="empty">No teachers yet. Be the first to add one!</div>`:
      teachers.map(t=>`<div class="teacher-card" onclick="selectTeacher(${t.id})">
        <div class="teacher-top">
          <div class="teacher-info"><div class="avatar">${initials(t.name)}</div>
            <div><div class="teacher-name">${t.name}</div><div class="teacher-subject">${t.subject}</div></div></div>
          <div><div class="rating-badge">${starsHTML(t.rating)} ${t.rating>0?t.rating.toFixed(1):"—"}</div>
          <div class="review-count">${t.reviews.length} review${t.reviews.length!==1?"s":""}</div></div>
        </div>
        ${t.reviews.length>0?`<div class="teacher-preview">"${t.reviews[0].text.slice(0,130)}${t.reviews[0].text.length>130?"...":""}"</div>`:""}`
      ).join("")}</div>`;
}

function renderAddTeacher() {
  const f = S.teacherForm;
  return `<div class="card-form"><div class="form-title">Add a teacher</div>
    <div class="form-row"><label class="form-label">Teacher name</label>
      <input type="text" placeholder="e.g. Ms. Johnson" value="${f.name}" oninput="S.teacherForm.name=this.value"/></div>
    <div class="form-row"><label class="form-label">Subject</label>
      <input type="text" placeholder="e.g. AP Chemistry" value="${f.subject}" oninput="S.teacherForm.subject=this.value"/></div>
    <div class="form-actions">
      <button class="btn btn-sm" onclick="S.showAddTeacher=false;render()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="submitTeacher()">Add teacher</button>
    </div></div>`;
}

function renderTeacher() {
  const data = getSchoolData(S.school.id);
  const teacher = data.teachers.find(t=>t.id===S.teacher);
  if (!teacher) return "";
  const rev = teacher.reviews;
  const avg = rev.length?(rev.reduce((a,r)=>a+r.stars,0)/rev.length).toFixed(1):"—";
  const summary = S.aiSummary[teacher.id];
  return `<button class="back-btn" onclick="S.teacher=null;S.showReviewForm=false;render()">← Back to ${S.school.name}</button>
    <div class="detail-header">
      <div class="detail-avatar">${initials(teacher.name)}</div>
      <div><div class="detail-name">${teacher.name}</div><div class="detail-meta">${teacher.subject} · ${S.school.name}</div></div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Rating</div><div class="stat-value">${avg}<span class="stat-sub">/5</span></div></div>
      <div class="stat-card"><div class="stat-label">Difficulty</div><div class="stat-value">${avgStat(rev,"difficulty")}<span class="stat-sub">/10</span></div></div>
      <div class="stat-card"><div class="stat-label">Chill</div><div class="stat-value">${avgStat(rev,"chill")}<span class="stat-sub">/10</span></div></div>
      <div class="stat-card"><div class="stat-label">Observant</div><div class="stat-value">${avgStat(rev,"observant")}<span class="stat-sub">/10</span></div></div>
      <div class="stat-card"><div class="stat-label">Take again</div><div class="stat-value" style="font-size:17px">${pctWTA(rev)}</div></div>
    </div>
    <div class="ai-summary">
      <div class="ai-label"><div class="ai-dot"></div> AI summary</div>
      ${summary===undefined?`<div class="ai-loading">Generating summary...</div>`:
        summary===null?`<div class="ai-loading">Not enough reviews to summarize yet.</div>`:
        `<ul class="ai-bullets">${summary.map(b=>`<li>${b}</li>`).join("")}</ul>`}
    </div>
    <div class="reviews-section">
      <div class="section-label">Student reviews</div>
      ${rev.length===0?`<div class="empty">No reviews yet. Write the first one!</div>`:
        rev.map(r=>`<div class="review-item">
          <div class="review-top">
            <span class="review-stars">${starsHTML(r.stars)} ${r.stars}/5</span>
            <span class="review-date">${r.period?r.period+" period":""} ${r.year?"· "+r.year:""}</span>
          </div>
          <div class="review-meta-row">
            <span class="review-meta-pill">Difficulty: ${r.difficulty}/10</span>
            <span class="review-meta-pill">Chill: ${r.chill}/10</span>
            <span class="review-meta-pill">Observant: ${r.observant}/10</span>
            ${r.subject?`<span class="review-meta-pill">${r.subject}</span>`:""}
            <span class="review-meta-pill ${r.wouldTakeAgain?"yes":"no"}">${r.wouldTakeAgain?"✓ Would take again":"✗ Would not take again"}</span>
          </div>
          <div class="review-text">${r.text}</div>
          ${r.advice?`<div class="review-advice"><strong>Advice for future students:</strong> ${r.advice}</div>`:""}
        </div>`).join("")}
    </div>
    ${S.showReviewForm?renderReviewForm(teacher):`<button class="btn btn-primary btn-full" onclick="S.showReviewForm=true;render()">Write a review</button>`}
    ${S.successMsg?`<div class="success-msg">✓ ${S.successMsg}</div>`:""}`;
}

function renderReviewForm(teacher) {
  const f = S.reviewForm;
  const sug = S.aiSuggestions[teacher.id]||{};
  return `<div class="card-form"><div class="form-title">Review ${teacher.name}</div>
    <div class="form-section"><div class="form-section-title">Class info</div>
      <div class="form-row"><label class="form-label">What did they teach you?</label>
        <input type="text" placeholder="e.g. AP Physics, Algebra 2, US History..." value="${f.subject}" oninput="S.reviewForm.subject=this.value"/></div>
      <div class="form-row"><label class="form-label">Period & school year</label>
        <div class="period-row">
          <select onchange="S.reviewForm.period=this.value"><option value="">Period...</option>
            ${PERIODS.map(p=>`<option value="${p}" ${f.period===p?"selected":""}>${p}</option>`).join("")}</select>
          <select onchange="S.reviewForm.year=this.value"><option value="">School year...</option>
            ${YEARS.map(y=>`<option value="${y}" ${f.year===y?"selected":""}>${y}</option>`).join("")}</select>
        </div></div></div>
    <div class="form-section"><div class="form-section-title">Rate your experience</div>
      <div class="form-row"><label class="form-label">Overall rating</label>
        <div class="star-picker">${[1,2,3,4,5].map(s=>`<button class="star-btn ${f.stars>=s?"active":""}" onclick="S.reviewForm.stars=${s};render()">★</button>`).join("")}</div></div>
      <div class="form-row"><label class="form-label">Difficulty <span style="color:var(--muted);font-weight:400">(1 = super easy · 10 = extremely hard)</span></label>
        <div class="scale-row"><span class="scale-label-sm">1</span>
          <input type="range" min="1" max="10" step="1" value="${f.difficulty}" oninput="S.reviewForm.difficulty=+this.value;render()"/>
          <span class="scale-label-sm">10</span><span class="scale-val">${f.difficulty}</span></div>
        <input type="text" placeholder="Any notes on difficulty? (optional)" value="${f.diffNote}" oninput="S.reviewForm.diffNote=this.value" style="margin-top:6px"/></div>
      <div class="form-row"><label class="form-label">How chill were they? <span style="color:var(--muted);font-weight:400">(1 = very strict · 10 = very relaxed)</span></label>
        <div class="scale-row"><span class="scale-label-sm">1</span>
          <input type="range" min="1" max="10" step="1" value="${f.chill}" oninput="S.reviewForm.chill=+this.value;render()"/>
          <span class="scale-label-sm">10</span><span class="scale-val">${f.chill}</span></div>
        <input type="text" placeholder="Any notes? (optional)" value="${f.chillNote}" oninput="S.reviewForm.chillNote=this.value" style="margin-top:6px"/></div>
      <div class="form-row"><label class="form-label">How observant were they? <span style="color:var(--muted);font-weight:400">(1 = barely noticed anyone · 10 = watched everything)</span></label>
        <div class="scale-row"><span class="scale-label-sm">1</span>
          <input type="range" min="1" max="10" step="1" value="${f.observant}" oninput="S.reviewForm.observant=+this.value;render()"/>
          <span class="scale-label-sm">10</span><span class="scale-val">${f.observant}</span></div>
        <input type="text" placeholder="Any notes? (optional)" value="${f.obsNote}" oninput="S.reviewForm.obsNote=this.value" style="margin-top:6px"/></div>
      <div class="form-row"><label class="form-label">Would you take this teacher again?</label>
        <div class="toggle-row">
          <div class="toggle-btn ${f.wouldTakeAgain===true?"toggle-yes":""}" onclick="S.reviewForm.wouldTakeAgain=true;render()">Yes</div>
          <div class="toggle-btn ${f.wouldTakeAgain===false?"toggle-no":""}" onclick="S.reviewForm.wouldTakeAgain=false;render()">No</div>
        </div></div></div>
    <div class="form-section"><div class="form-section-title">Your review</div>
      <div class="form-row"><label class="form-label">Advice for future students</label>
        <input type="text" placeholder="Tips, warnings, or suggestions for students taking this class..." value="${f.advice}" oninput="S.reviewForm.advice=this.value"/>
        ${sug.advice?`<div class="suggest-box"><div class="suggest-label">Suggestions — click to use</div><div class="suggest-chips">${sug.advice.map(s=>`<span class="suggest-chip" onclick="S.reviewForm.advice='${s.replace(/'/g,"\\'")}';render()">${s}</span>`).join("")}</div></div>`:""}</div>
      <div class="form-row"><label class="form-label">Full review</label>
        <textarea rows="6" placeholder="Share your overall experience — what was the class like? What did you think of the teaching style? What stood out?" oninput="S.reviewForm.text=this.value">${f.text}</textarea>
        ${sug.text?`<div class="suggest-box"><div class="suggest-label">Suggestions — click to add</div><div class="suggest-chips">${sug.text.map(s=>`<span class="suggest-chip" onclick="appendText('${s.replace(/'/g,"\\'")}');render()">${s}</span>`).join("")}</div></div>`:""}
        <button class="btn btn-sm" style="margin-top:10px" onclick="fetchSuggestions(${teacher.id})">✦ Get AI writing suggestions</button></div></div>
    <div class="form-actions">
      <button class="btn" onclick="S.showReviewForm=false;render()">Cancel</button>
      <button class="btn btn-primary" onclick="submitReview(${teacher.id})">Submit review</button>
    </div></div>`;
}

function appendText(s) { S.reviewForm.text = S.reviewForm.text ? S.reviewForm.text+" "+s : s; }

function selectSchool(id) { S.school=SCHOOLS.find(s=>s.id===id); S.teacher=null; S.showAddTeacher=false; render(); }

function selectTeacher(id) {
  S.teacher=id; S.showReviewForm=false; S.successMsg="";
  S.reviewForm={stars:0,period:"",year:"",subject:"",difficulty:5,diffNote:"",chill:5,chillNote:"",observant:5,obsNote:"",wouldTakeAgain:null,advice:"",text:""};
  render(); fetchAISummary(id);
}

async function fetchAISummary(teacherId) {
  const data=getSchoolData(S.school.id);
  const teacher=data.teachers.find(t=>t.id===teacherId);
  if(!teacher||teacher.reviews.length===0){S.aiSummary[teacherId]=null;render();return;}
  if(S.aiSummary[teacherId]!==undefined) return;
  S.aiSummary[teacherId]=undefined;
  const reviewText=teacher.reviews.map((r,i)=>`Review ${i+1} (${r.stars}/5, Difficulty:${r.difficulty}/10, Chill:${r.chill}/10, Observant:${r.observant}/10, Would take again:${r.wouldTakeAgain?"Yes":"No"}): "${r.text}"${r.advice?` Advice:"${r.advice}"`:"" }`).join("\n");
  try {
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`You are summarizing student reviews for HallPass, a high school teacher review site. Summarize the following reviews of ${teacher.name} (${teacher.subject}) as 4-5 concise bullet points covering: overall teaching quality, difficulty, chill vs strict, observant level, and recommendation. Be honest and student-friendly. Return ONLY a JSON array of strings, no markdown, no preamble.\n\nReviews:\n${reviewText}`}]})});
    const d=await res.json();
    S.aiSummary[teacherId]=JSON.parse((d.content?.[0]?.text||"[]").replace(/```json|```/g,"").trim());
  } catch(e){S.aiSummary[teacherId]=["Summary unavailable at this time."];}
  render();
}

async function fetchSuggestions(teacherId) {
  const f=S.reviewForm;
  const data=getSchoolData(S.school.id);
  const teacher=data.teachers.find(t=>t.id===teacherId);
  try {
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`A high school student is writing a review on HallPass for ${teacher.name} (${teacher.subject}). Ratings: Difficulty ${f.difficulty}/10, Chill ${f.chill}/10, Observant ${f.observant}/10, Would take again: ${f.wouldTakeAgain===true?"Yes":f.wouldTakeAgain===false?"No":"not answered"}. Current text: "${f.text||"(none yet)"}". Return a JSON object with "advice" (4 short advice tips for future students, max 8 words each) and "text" (4 short phrases to add to their review, max 8 words each). Return only valid JSON, no markdown.`}]})});
    const d=await res.json();
    S.aiSuggestions[teacherId]=JSON.parse((d.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim());
  } catch(e){S.aiSuggestions[teacherId]={advice:["Be specific about assignments","Mention exam difficulty","Share study tips","Note the class pace"],text:["Very helpful during office hours","Tests were challenging but fair","Class moves at a fast pace","Always willing to answer questions"]};}
  render();
}

function submitReview(teacherId) {
  const f=S.reviewForm;
  if(!f.stars||!f.text.trim()){alert("Please add a star rating and write a review.");return;}
  if(f.wouldTakeAgain===null){alert("Please answer the 'Would you take again?' question.");return;}
  const data=getSchoolData(S.school.id);
  const teacher=data.teachers.find(t=>t.id===teacherId);
  teacher.reviews.unshift({...f});
  teacher.rating=+(teacher.reviews.reduce((a,r)=>a+r.stars,0)/teacher.reviews.length).toFixed(1);
  delete S.aiSummary[teacherId];
  S.reviewForm={stars:0,period:"",year:"",subject:"",difficulty:5,diffNote:"",chill:5,chillNote:"",observant:5,obsNote:"",wouldTakeAgain:null,advice:"",text:""};
  S.showReviewForm=false; S.successMsg="Your review was submitted. Thank you!";
  render(); setTimeout(()=>{S.successMsg="";render();},4000); fetchAISummary(teacherId);
}

function submitTeacher() {
  const f=S.teacherForm;
  if(!f.name.trim()||!f.subject.trim()){alert("Please enter a name and subject.");return;}
  const data=getSchoolData(S.school.id);
  data.teachers.push({id:Date.now(),name:f.name.trim(),subject:f.subject.trim(),rating:0,reviews:[]});
  S.teacherForm={name:"",subject:""}; S.showAddTeacher=false; render();
}

render();
</script>
</body>
</html>
