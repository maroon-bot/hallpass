<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HallPass — Rate your teacher.</title>
  <style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f9f9f7;color:#1a1a1a;min-height:100vh;}
:root{--brand:#1a6b4a;--brand-light:#e1f5ee;--brand-mid:#1d9e75;--card:#ffffff;--border:rgba(0,0,0,0.1);--text:#1a1a1a;--muted:#6b7280;--radius:10px;--radius-lg:14px;}
#app{max-width:820px;margin:0 auto;padding:2rem 1.25rem 4rem;}
.header{text-align:center;margin-bottom:2.5rem;padding-bottom:2rem;border-bottom:1px solid var(--border);}
.header h1{font-size:32px;font-weight:600;color:var(--text);letter-spacing:-0.5px;}
.header h1 span{color:var(--brand-mid);}
.header p{font-size:15px;color:var(--muted);margin-top:6px;}
.nav-link{font-size:13px;color:var(--brand-mid);cursor:pointer;margin-top:10px;display:inline-block;background:none;border:none;padding:0;text-decoration:underline;}
input,textarea,select,button{font-family:inherit;}
.search-wrap{margin-bottom:1rem;}
.search-wrap input{width:100%;height:42px;padding:0 14px;border-radius:var(--radius);border:1px solid var(--border);font-size:14px;background:var(--card);color:var(--text);outline:none;display:block;}
.search-wrap input:focus{border-color:var(--brand-mid);box-shadow:0 0 0 3px rgba(29,158,117,0.1);}
.btn{height:42px;padding:0 18px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;cursor:pointer;white-space:nowrap;transition:background 0.15s;}
.btn:hover{background:#f3f3f0;}
.btn-primary{background:var(--brand);color:#fff;border-color:var(--brand);}
.btn-primary:hover{background:var(--brand-mid);border-color:var(--brand-mid);}
.btn-sm{height:34px;padding:0 14px;font-size:13px;}
.btn-full{width:100%;}
.btn-danger{background:#fff0f0;border:1px solid #f09595;color:#a32d2d;font-size:12px;height:28px;padding:0 10px;border-radius:var(--radius);cursor:pointer;}
.btn-danger:hover{background:#f09595;color:#fff;}
.btn-edit{background:var(--brand-light);border:1px solid var(--brand-mid);color:var(--brand);font-size:12px;height:28px;padding:0 10px;border-radius:var(--radius);cursor:pointer;}
.btn-edit:hover{background:var(--brand-mid);color:#fff;}
.admin-bar{background:#fff8e1;border:1px solid #ffc107;border-radius:var(--radius);padding:10px 16px;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#856404;}
.loading{text-align:center;padding:3rem;color:var(--muted);font-size:14px;}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--brand-mid);border-radius:50%;animation:spin 0.7s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.school-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem;}
.school-item{padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;background:var(--card);transition:all 0.15s;}
.school-item:hover{border-color:var(--brand-mid);background:var(--brand-light);}
.school-name{font-size:14px;font-weight:500;color:var(--text);}
.school-location{font-size:12px;color:var(--muted);margin-top:2px;}
.section-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:12px;}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);cursor:pointer;margin-bottom:1.5rem;background:none;border:none;padding:0;}
.back-btn:hover{color:var(--text);}
.school-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;gap:12px;}
.school-title{font-size:22px;font-weight:600;color:var(--text);}
.school-subtitle{font-size:13px;color:var(--muted);margin-top:4px;}
.teachers-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:1.5rem;}
.teacher-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;display:block;width:100%;text-align:left;transition:border-color 0.15s,box-shadow 0.15s;}
.teacher-card:hover{border-color:#ccc;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.teacher-card-inner{cursor:pointer;}
.teacher-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.teacher-info{display:flex;align-items:center;gap:12px;min-width:0;}
.avatar{width:42px;height:42px;border-radius:50%;background:var(--brand-light);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--brand);flex-shrink:0;}
.teacher-name{font-size:15px;font-weight:500;color:var(--text);}
.teacher-subject{font-size:13px;color:var(--muted);margin-top:2px;}
.teacher-right{flex-shrink:0;text-align:right;}
.rating-badge{background:var(--brand-light);color:var(--brand);font-size:13px;font-weight:600;padding:4px 10px;border-radius:20px;display:inline-block;white-space:nowrap;}
.review-count{font-size:12px;color:var(--muted);text-align:right;margin-top:4px;}
.teacher-preview{font-size:13px;color:var(--muted);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);line-height:1.5;font-style:italic;}
.admin-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.edit-form{background:#f9f9f7;border-radius:var(--radius);padding:12px;margin-top:10px;border:1px solid var(--border);}
.detail-header{display:flex;align-items:center;gap:16px;margin-bottom:1.5rem;}
.detail-avatar{width:58px;height:58px;border-radius:50%;background:var(--brand-light);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;color:var(--brand);flex-shrink:0;}
.detail-name{font-size:22px;font-weight:600;color:var(--text);}
.detail-meta{font-size:14px;color:var(--muted);margin-top:3px;}
.stats-row{display:flex;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap;}
.stat-card{flex:1;min-width:80px;background:#f3f3f0;border-radius:var(--radius);padding:12px 14px;}
.stat-label{font-size:11px;color:var(--muted);}
.stat-value{font-size:20px;font-weight:600;color:var(--text);margin-top:4px;}
.stat-sub{font-size:12px;color:var(--muted);}
.ai-summary{background:var(--brand-light);border:1px solid #9fe1cb;border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1.5rem;}
.ai-label{font-size:12px;color:var(--brand);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--brand-mid);}
.ai-bullets{padding-left:0;list-style:none;}
.ai-bullets li{font-size:14px;color:var(--text);line-height:1.6;padding:3px 0 3px 18px;position:relative;}
.ai-bullets li::before{content:"•";position:absolute;left:4px;color:var(--brand-mid);font-size:16px;}
.ai-loading{color:var(--muted);font-style:italic;font-size:14px;}
.reviews-section{margin-bottom:1.5rem;}
.review-item{padding:16px 0;border-bottom:1px solid var(--border);}
.review-item:last-child{border-bottom:none;}
.review-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.review-stars{color:var(--brand-mid);font-size:14px;font-weight:500;}
.review-date{font-size:12px;color:var(--muted);}
.review-meta-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.review-meta-pill{font-size:12px;padding:3px 10px;border-radius:20px;background:#f0f0ed;color:var(--muted);}
.review-meta-pill.yes{background:var(--brand-light);color:var(--brand);}
.review-meta-pill.no{background:#fff0f0;color:#a32d2d;}
.review-text{font-size:14px;color:var(--text);line-height:1.65;}
.review-advice{font-size:13px;color:var(--muted);margin-top:10px;padding:8px 12px;border-left:3px solid var(--brand-mid);background:var(--brand-light);border-radius:0 var(--radius) var(--radius) 0;}
.review-advice strong{color:var(--brand);}
.card-form{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.form-title{font-size:16px;font-weight:600;margin-bottom:1.25rem;color:var(--text);}
.form-section{margin-bottom:1.5rem;}
.form-section-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.form-row{margin-bottom:14px;}
.form-label{font-size:13px;color:var(--muted);margin-bottom:6px;display:block;}
.form-row input[type=text],.form-row textarea,.form-row select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--card);color:var(--text);outline:none;transition:border-color 0.15s;}
.form-row input[type=text]:focus,.form-row textarea:focus,.form-row select:focus{border-color:var(--brand-mid);box-shadow:0 0 0 3px rgba(29,158,117,0.1);}
.form-row textarea{resize:vertical;line-height:1.6;}
.scale-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.scale-label-sm{font-size:12px;color:var(--muted);min-width:20px;text-align:center;flex-shrink:0;}
.scale-val{font-size:15px;font-weight:600;color:var(--brand);min-width:28px;text-align:center;flex-shrink:0;}
input[type=range].colored-slider{flex:1;cursor:pointer;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;outline:none;border:none;}
input[type=range].colored-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--brand);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.2);}
input[type=range].colored-slider::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--brand);cursor:pointer;border:2px solid #fff;}
.toggle-row{display:flex;gap:10px;}
.toggle-btn{flex:1;padding:10px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;cursor:pointer;background:var(--card);color:var(--muted);text-align:center;transition:all 0.15s;}
.toggle-btn:hover{background:#f3f3f0;}
.toggle-yes{background:var(--brand-light);border-color:var(--brand-mid);color:var(--brand);font-weight:500;}
.toggle-no{background:#fff0f0;border-color:#f09595;color:#a32d2d;font-weight:500;}
.star-picker{display:flex;gap:6px;}
.star-btn{background:none;border:2px solid #ddd;border-radius:var(--radius);font-size:26px;cursor:pointer;padding:4px 8px;line-height:1;color:#ccc;user-select:none;-webkit-user-select:none;transition:all 0.1s;}
.star-btn.lit{color:var(--brand-mid);background:var(--brand-light);border-color:var(--brand-mid);}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:1.25rem;}
.success-msg{background:var(--brand-light);color:var(--brand);font-size:14px;padding:12px 16px;border-radius:var(--radius);margin-top:12px;font-weight:500;}
.error-msg{background:#fff0f0;color:#a32d2d;font-size:14px;padding:12px 16px;border-radius:var(--radius);margin-top:12px;}
.empty{text-align:center;padding:2.5rem;color:var(--muted);font-size:14px;}
.suggest-box{background:#f3f3f0;border-radius:var(--radius);padding:10px 14px;margin-top:8px;}
.suggest-label{font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;}
.suggest-chips{display:flex;flex-wrap:wrap;gap:6px;}
.suggest-chip{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all 0.15s;}
.suggest-chip:hover{border-color:var(--brand-mid);color:var(--brand);background:var(--brand-light);}
.period-row{display:flex;gap:8px;}
.period-row select{flex:1;}
.category-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
.category-pill{font-size:13px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all 0.15s;}
.category-pill:hover{border-color:var(--brand-mid);color:var(--brand);background:var(--brand-light);}
.category-pill.selected{background:var(--brand-light);border-color:var(--brand-mid);color:var(--brand);font-weight:500;}
.feedback-intro{font-size:14px;color:var(--muted);margin-bottom:1.5rem;line-height:1.6;}
.submitted-box{text-align:center;padding:3rem 1rem;}
.submitted-check{font-size:52px;color:var(--brand-mid);margin-bottom:16px;}
.submitted-title{font-size:22px;font-weight:600;color:var(--text);margin-bottom:8px;}
.submitted-sub{font-size:14px;color:var(--muted);}
.suggestion-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:10px;}
.suggestion-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px;}
.suggestion-cat{font-size:12px;padding:3px 10px;border-radius:20px;background:var(--brand-light);color:var(--brand);}
.suggestion-who{font-size:12px;color:var(--muted);}
.suggestion-text{font-size:14px;color:var(--text);line-height:1.5;}
.footer{text-align:center;margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--border);}
.admin-link{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:0;opacity:0.35;}
.admin-link:hover{opacity:1;}
@media(max-width:600px){.stats-row{gap:6px;}.stat-card{padding:10px;}.stat-value{font-size:17px;}.school-header{flex-direction:column;}}
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>Hall<span>Pass</span></h1>
    <p>Rate your teacher.</p>
    <button class="nav-link" onclick="goFeedback()">Want to add your school or have any other suggestions or issues?</button>
  </div>
  <div id="view-root"></div>
  <div class="footer">
    <button class="admin-link" onclick="promptAdmin()">Admin</button>
  </div>
</div>
<script>
const SUPABASE_URL="https://kxlkljrimhvmjrftrvuw.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4bGtsanJpbWh2bWpyZnRydnV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4ODAxOTYsImV4cCI6MjA4OTQ1NjE5Nn0._VnqxOge1_KWVAcVGWM3ZQppQdFJrxXv9oJqsUptNqs";

async function sb(path,options={}){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{
    headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json","Prefer":"return=representation",...(options.headers||{})},
    ...options
  });
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const txt=await res.text();return txt?JSON.parse(txt):[];
}

const ADMIN_PW="maroonman";
const PERIODS=["0","1st","2nd","3rd","4th","5th","6th","7th","8th"];
const YEARS=["2025-2026","2024-2025","2023-2024","2022-2023","2021-2022"];
const FB_CATS=["New feature idea","Bug or something broken","Add / remove a school","Add / remove a teacher","Review concern","Other"];

function ini(n){return n.split(" ").filter(w=>/[A-Z]/.test(w)).map(w=>w[0]).join("").slice(0,2);}
function starsHTML(n,max=5){return Array.from({length:max},(_,i)=>i<Math.round(n)?"★":"☆").join("");}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function slBg(v){const p=((v-1)/9)*100;return`linear-gradient(to right,#1d9e75 0%,#1d9e75 ${p}%,#ddd ${p}%,#ddd 100%)`;}
function fmtDate(d){const dt=new Date(d);const mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return mo[dt.getMonth()]+" "+dt.getFullYear();}

let S={
  view:"search",school:null,teacher:null,searchVal:"",
  schools:[],teachers:[],reviews:[],suggestions:[],
  showAddTeacher:false,showReviewForm:false,editingTeacherId:null,
  rf:{stars:0,period:"",year:"",subject:"",difficulty:5,diffNote:"",chill:5,chillNote:"",observant:5,obsNote:"",wouldTakeAgain:null,advice:"",text:""},
  successMsg:"",errorMsg:"",aiSum:{},aiSug:{},
  fb:{category:"",text:"",submitted:false},
  isAdmin:false,loading:false
};

function render(){
  const root=document.getElementById("view-root");
  if(S.loading){root.innerHTML=`<div class="loading"><div class="spinner"></div><br>Loading...</div>`;return;}
  if(S.view==="feedback"){root.innerHTML=renderFeedback();return;}
  if(!S.school){root.innerHTML=renderSearch();setupSearch();}
  else if(!S.teacher){root.innerHTML=renderSchool();}
  else{root.innerHTML=renderTeacher();bindSliders();}
}

async function init(){
  S.loading=true;render();
  try{S.schools=await sb("schools?select=*&order=name");}
  catch(e){S.schools=[];}
  S.loading=false;render();
}

function promptAdmin(){
  if(S.isAdmin){S.isAdmin=false;render();return;}
  const pw=prompt("Enter admin password:");
  if(pw===ADMIN_PW){S.isAdmin=true;render();}
  else if(pw!==null){alert("Incorrect password.");}
}

function goFeedback(){S.view="feedback";S.fb={category:"",text:"",submitted:false};loadSuggestions();render();}
function goHome(){S.view="search";S.school=null;S.teacher=null;render();}

async function loadSuggestions(){
  try{S.suggestions=await sb("suggestions?select=*&order=created_at.desc&limit=10");}catch(e){}render();
}

function setupSearch(){
  const el=document.getElementById("school-input");if(!el)return;
  el.addEventListener("input",function(){
    S.searchVal=this.value;const q=S.searchVal.toLowerCase();
    const f=S.schools.filter(s=>s.name.toLowerCase().includes(q)||s.location.toLowerCase().includes(q));
    document.querySelector(".school-list").innerHTML=schoolListHTML(f);
  });
}

function schoolListHTML(list){
  return list.length===0?`<div class="empty">No schools found.</div>`:
    list.map(s=>`<div class="school-item" onclick="selSchool(${s.id})"><div class="school-name">${esc(s.name)}</div><div class="school-location">${esc(s.location)} · ~${s.students.toLocaleString()} students</div></div>`).join("");
}

function bindSliders(){
  document.querySelectorAll("input[type=range].colored-slider").forEach(el=>{
    el.style.background=slBg(+el.value);
    el.addEventListener("input",function(){
      S.rf[this.dataset.key]=+this.value;
      const d=document.getElementById("val-"+this.dataset.key);if(d)d.textContent=this.value;
      this.style.background=slBg(+this.value);
    });
  });
}

function adminBar(){
  return S.isAdmin?`<div class="admin-bar"><strong>Admin mode on</strong> — you can edit and delete teachers and reviews. <button class="btn btn-sm" onclick="S.isAdmin=false;render()">Log out</button></div>`:"";
}

function renderSearch(){
  const q=S.searchVal.toLowerCase();
  const f=S.schools.filter(s=>s.name.toLowerCase().includes(q)||s.location.toLowerCase().includes(q));
  return`${adminBar()}<div class="section-label">Find your school</div>
    <div class="search-wrap"><input id="school-input" type="text" placeholder="Search by school name or city..." value="${esc(S.searchVal)}"/></div>
    <div class="school-list">${schoolListHTML(f)}</div>`;
}

async function selSchool(id){
  S.school=S.schools.find(s=>s.id===id);S.teacher=null;S.showAddTeacher=false;
  S.loading=true;render();
  try{S.teachers=await sb(`teachers?select=*,reviews(*)&school_id=eq.${id}&order=name`);}catch(e){S.teachers=[];}
  S.loading=false;render();
}

function renderSchool(){
  const ts=S.teachers;
  return`${adminBar()}<button class="back-btn" onclick="S.school=null;render()">← Back to search</button>
    <div class="school-header"><div><div class="school-title">${esc(S.school.name)}</div><div class="school-subtitle">${esc(S.school.location)} · ${ts.length} teacher${ts.length!==1?"s":""} reviewed</div></div>
    <button class="btn btn-primary btn-sm" onclick="S.showAddTeacher=!S.showAddTeacher;render()">+ Add teacher</button></div>
    ${S.showAddTeacher?renderAddTeacher():""}
    <div class="section-label">Teachers</div>
    <div class="teachers-grid">${ts.length===0?`<div class="empty">No teachers yet. Be the first to add one!</div>`:
      ts.map(t=>{
        const rev=t.reviews||[];
        const avg=rev.length?(rev.reduce((a,r)=>a+r.stars,0)/rev.length).toFixed(1):null;
        const preview=rev.length>0?rev.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0]:null;
        return`<div class="teacher-card">
          <div class="teacher-card-inner" onclick="selTeacher(${t.id})">
            <div class="teacher-top">
              <div class="teacher-info"><div class="avatar">${ini(t.name)}</div><div><div class="teacher-name">${esc(t.name)}</div><div class="teacher-subject">${esc(t.subject)}</div></div></div>
              <div class="teacher-right"><div class="rating-badge">${avg?starsHTML(+avg)+" "+avg:"No reviews yet"}</div><div class="review-count">${rev.length} review${rev.length!==1?"s":""}</div></div>
            </div>
            ${preview?`<div class="teacher-preview">"${esc(preview.review_text.slice(0,130))}${preview.review_text.length>130?"...":""}"</div>`:""}
          </div>
          ${S.isAdmin?`<div class="admin-actions">
            <button class="btn-edit" onclick="event.stopPropagation();startEditTeacher(${t.id})">Edit</button>
            <button class="btn-danger" onclick="event.stopPropagation();deleteTeacher(${t.id})">Delete teacher</button>
          </div>${S.editingTeacherId===t.id?renderEditTeacherForm(t):""}`:""}</div>`;
      }).join("")}</div>`;
}

function renderEditTeacherForm(t){
  return`<div class="edit-form">
    <div class="form-row"><label class="form-label">Teacher name</label><input type="text" id="edit-t-name" value="${esc(t.name)}"/></div>
    <div class="form-row"><label class="form-label">Subject</label><input type="text" id="edit-t-subject" value="${esc(t.subject)}"/></div>
    <div class="form-actions"><button class="btn btn-sm" onclick="S.editingTeacherId=null;render()">Cancel</button><button class="btn btn-primary btn-sm" onclick="saveEditTeacher(${t.id})">Save</button></div></div>`;
}

function startEditTeacher(id){S.editingTeacherId=S.editingTeacherId===id?null:id;render();}

async function saveEditTeacher(id){
  const name=document.getElementById("edit-t-name")?.value.trim();
  const subject=document.getElementById("edit-t-subject")?.value.trim();
  if(!name||!subject){alert("Name and subject cannot be empty.");return;}
  try{
    await sb(`teachers?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({name,subject})});
    const t=S.teachers.find(t=>t.id===id);if(t){t.name=name;t.subject=subject;}
    S.editingTeacherId=null;render();
  }catch(e){alert("Failed to save. Please try again.");}
}

async function deleteTeacher(id){
  if(!confirm("Delete this teacher and all their reviews? This cannot be undone."))return;
  try{
    await sb(`reviews?teacher_id=eq.${id}`,{method:"DELETE",headers:{}});
    await sb(`teachers?id=eq.${id}`,{method:"DELETE",headers:{}});
    S.teachers=S.teachers.filter(t=>t.id!==id);render();
  }catch(e){alert("Failed to delete. Please try again.");}
}

function renderAddTeacher(){
  return`<div class="card-form"><div class="form-title">Add a teacher</div>
    <div class="form-row"><label class="form-label">Teacher name</label><input type="text" id="t-name" placeholder="e.g. Ms. Johnson"/></div>
    <div class="form-row"><label class="form-label">Subject</label><input type="text" id="t-subject" placeholder="e.g. AP Chemistry"/></div>
    <div class="form-actions"><button class="btn btn-sm" onclick="S.showAddTeacher=false;render()">Cancel</button><button class="btn btn-primary btn-sm" onclick="submitTeacher()">Add teacher</button></div></div>`;
}

async function submitTeacher(){
  const name=document.getElementById("t-name")?.value.trim();
  const subject=document.getElementById("t-subject")?.value.trim();
  if(!name||!subject){alert("Please enter a name and subject.");return;}
  try{
    const res=await sb("teachers",{method:"POST",body:JSON.stringify({name,subject,school_id:S.school.id})});
    S.teachers.push({...res[0],reviews:[]});S.showAddTeacher=false;render();
  }catch(e){alert("Failed to add teacher. Please try again.");}
}

async function selTeacher(id){
  S.teacher=id;S.showReviewForm=false;S.successMsg="";
  S.rf={stars:0,period:"",year:"",subject:"",difficulty:5,diffNote:"",chill:5,chillNote:"",observant:5,obsNote:"",wouldTakeAgain:null,advice:"",text:""};
  S.loading=true;render();
  try{S.reviews=await sb(`reviews?teacher_id=eq.${id}&order=created_at.desc`);}catch(e){S.reviews=[];}
  S.loading=false;render();
  fetchSum(id);
}

function getTeacher(){return S.teachers.find(t=>t.id===S.teacher);}

function calcStats(rev){
  if(!rev.length)return{avg:"—",diff:"—",chill:"—",obs:"—",wta:"—"};
  return{
    avg:(rev.reduce((a,r)=>a+r.stars,0)/rev.length).toFixed(1),
    diff:(rev.reduce((a,r)=>a+r.difficulty,0)/rev.length).toFixed(1),
    chill:(rev.reduce((a,r)=>a+r.chill,0)/rev.length).toFixed(1),
    obs:(rev.reduce((a,r)=>a+r.observant,0)/rev.length).toFixed(1),
    wta:Math.round(rev.filter(r=>r.would_take_again).length/rev.length*100)+"%"
  };
}

function renderTeacher(){
  const teacher=getTeacher();if(!teacher)return"";
  const rev=S.reviews;const st=calcStats(rev);const sum=S.aiSum[S.teacher];
  return`${adminBar()}<button class="back-btn" onclick="S.teacher=null;render()">← Back to ${esc(S.school.name)}</button>
    <div class="detail-header"><div class="detail-avatar">${ini(teacher.name)}</div><div><div class="detail-name">${esc(teacher.name)}</div><div class="detail-meta">${esc(teacher.subject)} · ${esc(S.school.name)}</div></div></div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Rating</div><div class="stat-value">${st.avg}<span class="stat-sub">/5</span></div></div>
      <div class="stat-card"><div class="stat-label">Difficulty</div><div class="stat-value">${st.diff}<span class="stat-sub">/10</span></div></div>
      <div class="stat-card"><div class="stat-label">Chill</div><div class="stat-value">${st.chill}<span class="stat-sub">/10</span></div></div>
      <div class="stat-card"><div class="stat-label">Observant</div><div class="stat-value">${st.obs}<span class="stat-sub">/10</span></div></div>
      <div class="stat-card"><div class="stat-label">Take again</div><div class="stat-value" style="font-size:17px">${st.wta}</div></div>
    </div>
    <div class="ai-summary"><div class="ai-label"><div class="ai-dot"></div> AI summary</div>
      ${sum===undefined?`<div class="ai-loading">Generating summary...</div>`:sum===null?`<div class="ai-loading">Not enough reviews to summarize yet.</div>`:`<ul class="ai-bullets">${sum.map(b=>`<li>${esc(b)}</li>`).join("")}</ul>`}
    </div>
    <div class="reviews-section"><div class="section-label">Student reviews</div>
      ${rev.length===0?`<div class="empty">No reviews yet. Write the first one!</div>`:rev.map(r=>`
        <div class="review-item">
          <div class="review-top"><span class="review-stars">${starsHTML(r.stars)} ${r.stars}/5</span><span class="review-date">${r.period?"Period "+r.period:""} ${r.year?"· "+r.year:""}</span></div>
          <div class="review-meta-row">
            <span class="review-meta-pill">Difficulty: ${r.difficulty}/10</span>
            <span class="review-meta-pill">Chill: ${r.chill}/10</span>
            <span class="review-meta-pill">Observant: ${r.observant}/10</span>
            ${r.subject?`<span class="review-meta-pill">${esc(r.subject)}</span>`:""}
            <span class="review-meta-pill ${r.would_take_again?"yes":"no"}">${r.would_take_again?"✓ Would take again":"✗ Would not take again"}</span>
          </div>
          <div class="review-text">${esc(r.review_text)}</div>
          ${r.advice?`<div class="review-advice"><strong>Advice for future students:</strong> ${esc(r.advice)}</div>`:""}
          ${S.isAdmin?`<div style="margin-top:8px"><button class="btn-danger" onclick="deleteReview(${r.id})">Delete review</button></div>`:""}
        </div>`).join("")}
    </div>
    ${S.showReviewForm?renderReviewForm(teacher):`<button class="btn btn-primary btn-full" onclick="S.showReviewForm=true;render()">Write a review</button>`}
    ${S.successMsg?`<div class="success-msg">✓ ${S.successMsg}</div>`:""}
    ${S.errorMsg?`<div class="error-msg">${S.errorMsg}</div>`:""}`;
}

async function deleteReview(id){
  if(!confirm("Delete this review? This cannot be undone."))return;
  try{
    await sb(`reviews?id=eq.${id}`,{method:"DELETE",headers:{}});
    S.reviews=S.reviews.filter(r=>r.id!==id);
    delete S.aiSum[S.teacher];render();fetchSum(S.teacher);
  }catch(e){alert("Failed to delete. Please try again.");}
}

function renderReviewForm(teacher){
  const f=S.rf;const sug=S.aiSug[teacher.id]||{};
  return`<div class="card-form"><div class="form-title">Review ${esc(teacher.name)}</div>
    <div class="form-section"><div class="form-section-title">Class info</div>
      <div class="form-row"><label class="form-label">What did they teach you?</label><input type="text" id="r-subject" placeholder="e.g. AP Physics, Algebra 2..." value="${esc(f.subject)}"/></div>
      <div class="form-row"><label class="form-label">Period & school year</label>
        <div class="period-row">
          <select id="r-period"><option value="">Period...</option>${PERIODS.map(p=>`<option value="${p}" ${f.period===p?"selected":""}>${p==="0"?"Period 0":p}</option>`).join("")}</select>
          <select id="r-year"><option value="">School year...</option>${YEARS.map(y=>`<option value="${y}" ${f.year===y?"selected":""}>${y}</option>`).join("")}</select>
        </div></div></div>
    <div class="form-section"><div class="form-section-title">Rate your experience</div>
      <div class="form-row"><label class="form-label">Overall rating</label>
        <div class="star-picker">
          <button class="star-btn${f.stars>=1?" lit":""}" data-star="1">★</button>
          <button class="star-btn${f.stars>=2?" lit":""}" data-star="2">★</button>
          <button class="star-btn${f.stars>=3?" lit":""}" data-star="3">★</button>
          <button class="star-btn${f.stars>=4?" lit":""}" data-star="4">★</button>
          <button class="star-btn${f.stars>=5?" lit":""}" data-star="5">★</button>
        </div></div>
      <div class="form-row"><label class="form-label">Difficulty <span style="font-weight:400;color:var(--muted)">(1 = super easy · 10 = extremely hard)</span></label>
        <div class="scale-row"><span class="scale-label-sm">1</span><input type="range" class="colored-slider" min="1" max="10" step="1" value="${f.difficulty}" data-key="difficulty" style="background:${slBg(f.difficulty)}"/><span class="scale-label-sm">10</span><span class="scale-val" id="val-difficulty">${f.difficulty}</span></div>
        <input type="text" id="r-diffNote" placeholder="Any notes on difficulty? (optional)" value="${esc(f.diffNote)}" style="margin-top:6px"/></div>
      <div class="form-row"><label class="form-label">How chill were they? <span style="font-weight:400;color:var(--muted)">(1 = very strict · 10 = very relaxed)</span></label>
        <div class="scale-row"><span class="scale-label-sm">1</span><input type="range" class="colored-slider" min="1" max="10" step="1" value="${f.chill}" data-key="chill" style="background:${slBg(f.chill)}"/><span class="scale-label-sm">10</span><span class="scale-val" id="val-chill">${f.chill}</span></div>
        <input type="text" id="r-chillNote" placeholder="Any notes? (optional)" value="${esc(f.chillNote)}" style="margin-top:6px"/></div>
      <div class="form-row"><label class="form-label">How observant were they? <span style="font-weight:400;color:var(--muted)">(1 = barely noticed · 10 = watched everything)</span></label>
        <div class="scale-row"><span class="scale-label-sm">1</span><input type="range" class="colored-slider" min="1" max="10" step="1" value="${f.observant}" data-key="observant" style="background:${slBg(f.observant)}"/><span class="scale-label-sm">10</span><span class="scale-val" id="val-observant">${f.observant}</span></div>
        <input type="text" id="r-obsNote" placeholder="Any notes? (optional)" value="${esc(f.obsNote)}" style="margin-top:6px"/></div>
      <div class="form-row"><label class="form-label">Would you take this teacher again?</label>
        <div class="toggle-row" id="toggle-row">
          <div class="toggle-btn${f.wouldTakeAgain===true?" toggle-yes":""}" onclick="setWTA(true)">Yes</div>
          <div class="toggle-btn${f.wouldTakeAgain===false?" toggle-no":""}" onclick="setWTA(false)">No</div>
        </div></div></div>
    <div class="form-section"><div class="form-section-title">Your review</div>
      <div class="form-row"><label class="form-label">Advice for future students</label>
        <input type="text" id="r-advice" placeholder="Tips, warnings, or suggestions..." value="${esc(f.advice)}"/>
        ${sug.advice?`<div class="suggest-box"><div class="suggest-label">Suggestions — click to use</div><div class="suggest-chips">${sug.advice.map(s=>`<span class="suggest-chip" onclick="document.getElementById('r-advice').value=${JSON.stringify(s)};S.rf.advice=${JSON.stringify(s)}">${esc(s)}</span>`).join("")}</div></div>`:""}</div>
      <div class="form-row"><label class="form-label">Full review</label>
        <textarea id="r-text" rows="6" placeholder="Share your overall experience...">${esc(f.text)}</textarea>
        ${sug.text?`<div class="suggest-box"><div class="suggest-label">Suggestions — click to add</div><div class="suggest-chips">${sug.text.map(s=>`<span class="suggest-chip" onclick="appendTxt(${JSON.stringify(s)});document.getElementById('r-text').value=S.rf.text">${esc(s)}</span>`).join("")}</div></div>`:""}
        <button class="btn btn-sm" style="margin-top:10px" onclick="fetchSug(${teacher.id})">✦ Get AI writing suggestions</button></div></div>
    <div class="form-actions"><button class="btn" onclick="S.showReviewForm=false;render()">Cancel</button><button class="btn btn-primary" onclick="submitReview(${teacher.id})">Submit review</button></div></div>`;
}

async function submitReview(tid){
  const f=S.rf;
  f.subject=document.getElementById("r-subject")?.value||"";f.period=document.getElementById("r-period")?.value||"";
  f.year=document.getElementById("r-year")?.value||"";f.diffNote=document.getElementById("r-diffNote")?.value||"";
  f.chillNote=document.getElementById("r-chillNote")?.value||"";f.obsNote=document.getElementById("r-obsNote")?.value||"";
  f.advice=document.getElementById("r-advice")?.value||"";f.text=document.getElementById("r-text")?.value||"";
  if(!f.stars||!f.text.trim()){alert("Please add a star rating and write a review.");return;}
  if(f.wouldTakeAgain===null){alert("Please answer the 'Would you take again?' question.");return;}
  try{
    const res=await sb("reviews",{method:"POST",body:JSON.stringify({
      teacher_id:tid,stars:f.stars,period:f.period,year:f.year,subject:f.subject,
      difficulty:f.difficulty,diff_note:f.diffNote,chill:f.chill,chill_note:f.chillNote,
      observant:f.observant,obs_note:f.obsNote,would_take_again:f.wouldTakeAgain,
      advice:f.advice,review_text:f.text
    })});
    S.reviews.unshift(res[0]);
    S.rf={stars:0,period:"",year:"",subject:"",difficulty:5,diffNote:"",chill:5,chillNote:"",observant:5,obsNote:"",wouldTakeAgain:null,advice:"",text:""};
    S.showReviewForm=false;S.successMsg="Your review was submitted. Thank you!";S.errorMsg="";
    delete S.aiSum[tid];render();setTimeout(()=>{S.successMsg="";render();},4000);fetchSum(tid);
    const t=S.teachers.find(t=>t.id===tid);if(t){if(!t.reviews)t.reviews=[];t.reviews.push(res[0]);}
  }catch(e){S.errorMsg="Failed to submit review. Please try again.";render();}
}

function renderFeedback(){
  if(S.fb.submitted)return`<button class="back-btn" onclick="goHome()">← Back to home</button>
    <div class="submitted-box"><div class="submitted-check">✓</div><div class="submitted-title">Thanks for your suggestion!</div>
    <div class="submitted-sub">We read every submission and use them to improve HallPass.</div>
    <button class="btn btn-primary" style="margin-top:1.5rem" onclick="goHome()">Back to HallPass</button></div>
    ${S.suggestions.length?renderSuggestions():""}`;
  return`<button class="back-btn" onclick="goHome()">← Back to home</button>
    <div class="section-label">Suggest a change</div>
    <p class="feedback-intro">Want to add your school, report a bug, flag a review, or share an idea? Let us know below.</p>
    <div class="card-form">
      <div class="form-row"><label class="form-label">What's this about?</label>
        <div class="category-pills">${FB_CATS.map(c=>`<div class="category-pill${S.fb.category===c?" selected":""}" onclick="setFbCat(this,'${c}')">${c}</div>`).join("")}</div></div>
      <div class="form-row"><label class="form-label">Your suggestion or report</label>
        <textarea id="fb-text" rows="5" placeholder="Describe your suggestion, bug, or request...">${esc(S.fb.text)}</textarea></div>
      <div class="form-row"><label class="form-label">Your name or handle <span style="font-weight:400">(optional)</span></label>
        <input type="text" id="fb-name" placeholder="e.g. @student123 or leave blank"/></div>
      <div class="form-actions"><button class="btn" onclick="goHome()">Cancel</button><button class="btn btn-primary" onclick="submitFeedback()">Submit suggestion</button></div></div>
    ${S.suggestions.length?renderSuggestions():""}`;
}

function renderSuggestions(){
  return`<div class="section-label" style="margin-top:0.5rem">Recent suggestions</div>
    ${S.suggestions.map((s,i)=>`<div class="suggestion-card">
      <div class="suggestion-meta"><span class="suggestion-cat">${esc(s.category||"General")}</span>
      <div style="display:flex;align-items:center;gap:8px"><span class="suggestion-who">${esc(s.name||"Anonymous")} · ${fmtDate(s.created_at)}</span>
      ${S.isAdmin?`<button class="btn-danger" onclick="deleteSuggestion(${s.id})">Delete</button>`:""}</div></div>
      <div class="suggestion-text">${esc(s.body)}</div></div>`).join("")}`;
}

async function deleteSuggestion(id){
  if(!confirm("Delete this suggestion?"))return;
  try{await sb(`suggestions?id=eq.${id}`,{method:"DELETE",headers:{}});S.suggestions=S.suggestions.filter(s=>s.id!==id);render();}
  catch(e){alert("Failed to delete.");}
}

function setFbCat(el,c){S.fb.category=c;document.querySelectorAll(".category-pill").forEach(p=>p.classList.toggle("selected",p.textContent===c));}

async function submitFeedback(){
  const text=document.getElementById("fb-text")?.value.trim();const name=document.getElementById("fb-name")?.value.trim();
  if(!text){alert("Please write your suggestion.");return;}if(!S.fb.category){alert("Please select a category.");return;}
  try{
    const res=await sb("suggestions",{method:"POST",body:JSON.stringify({category:S.fb.category,body:text,name:name||""})});
    S.suggestions.unshift(res[0]);S.fb.submitted=true;render();
  }catch(e){alert("Failed to submit. Please try again.");}
}

function setWTA(val){
  S.rf.wouldTakeAgain=val;
  document.querySelectorAll("#toggle-row .toggle-btn").forEach((b,i)=>{b.className="toggle-btn";if(i===0&&val===true)b.classList.add("toggle-yes");if(i===1&&val===false)b.classList.add("toggle-no");});
}

function appendTxt(s){S.rf.text=S.rf.text?S.rf.text+" "+s:s;}

async function fetchSum(tid){
  const rev=S.reviews;if(!rev.length){S.aiSum[tid]=null;render();return;}
  if(S.aiSum[tid]!==undefined)return;S.aiSum[tid]=undefined;
  const teacher=getTeacher();if(!teacher)return;
  const rt=rev.map((r,i)=>`Review ${i+1} (${r.stars}/5, Difficulty:${r.difficulty}/10, Chill:${r.chill}/10, Observant:${r.observant}/10, Would take again:${r.would_take_again?"Yes":"No"}): "${r.review_text}"${r.advice?` Advice:"${r.advice}"`:"" }`).join("\n");
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`You summarize student reviews for HallPass, a high school teacher review site. Summarize reviews of ${teacher.name} (${teacher.subject}) as 4-5 bullet points covering: teaching quality, difficulty, chill vs strict, observant level, recommendation. Be honest and student-friendly. Return ONLY a JSON array of strings, no markdown.\n\nReviews:\n${rt}`}]})});
    const d=await res.json();S.aiSum[tid]=JSON.parse((d.content?.[0]?.text||"[]").replace(/```json|```/g,"").trim());
  }catch(e){S.aiSum[tid]=["Summary unavailable at this time."];}render();
}

async function fetchSug(tid){
  const f=S.rf;const teacher=getTeacher();if(!teacher)return;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`A student is reviewing ${teacher.name} (${teacher.subject}) on HallPass. Difficulty:${f.difficulty}/10, Chill:${f.chill}/10, Observant:${f.observant}/10, Take again:${f.wouldTakeAgain===true?"Yes":f.wouldTakeAgain===false?"No":"not answered"}. Text:"${f.text||"none"}". Return JSON with "advice"(4 tips, max 8 words each) and "text"(4 phrases to add, max 8 words each). Only valid JSON.`}]})});
    const d=await res.json();S.aiSug[tid]=JSON.parse((d.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim());
  }catch(e){S.aiSug[tid]={advice:["Be specific about assignments","Mention exam difficulty","Share study tips","Note the class pace"],text:["Very helpful during office hours","Tests were challenging but fair","Class moves at a fast pace","Always willing to answer questions"]};}
  render();
}

document.addEventListener("click",function(e){
  if(e.target.classList.contains("star-btn")){const n=+e.target.dataset.star;S.rf.stars=n;document.querySelectorAll(".star-btn").forEach((b,i)=>b.classList.toggle("lit",i<n));}
});

init();
</script>
</body>
</html>
